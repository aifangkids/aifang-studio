<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Success | AiFang Kids</title>
    
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
    
    <link rel="stylesheet" href="./assets/css/order-success.css">
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-5XTC9J1E5P"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-5XTC9J1E5P');
    </script>
</head>
<body>

    <header class="top-header">
        <img src="images/ui/logo.png" class="main-logo" alt="AIFANG" onclick="location.href='index.html'">
    </header>

    <div class="success-container">
        <div class="success-hero">
            <img id="success-icon-img" src="./images/ui/success01.png" alt="Success">
            <h1 class="success-title">Thank You!</h1>
            <p class="success-subtitle">訂單已成功提交，請通知 LINE 完成最後確認</p>
        </div>

        <div class="order-card">
            <div class="section-title">訂單資訊</div>
            
            <div class="info-grid">
                <div class="info-row">
                    <span class="label">訂單編號</span>
                    <span id="display-order-id" class="value">--</span>
                </div>
                <div class="info-row">
                    <span class="label">訂購人</span>
                    <span id="display-name" class="value">--</span>
                </div>
                <div class="info-row">
                    <span class="label">Email</span>
                    <span id="display-email" class="value">--</span>
                </div>
            </div>

            <hr class="divider">

            <div class="section-title">商品明細</div>
            <div id="display-item-list" class="item-list-container">
                </div>

            <div class="summary-box">
                <div class="summary-row">
                    <span>小計 Subtotal</span>
                    <span id="display-subtotal">NT$ 0</span>

                <div id="display-coupon-remark" class="coupon-remark"></div>
                
                <div class="summary-row total">
                    <span>總計 Total</span>
                    <span id="display-total">NT$ 0</span>
                </div>
            </div>
        </div>

<div class="action-section">
    <a href="#" id="line-link" class="line-btn">
        <img src="./images/ui/line_icon.png" alt="line" class="btn-icon"> 
        <span>通知 LINE 官方(請複製訂單內容)</span>
    </a>
</div>
            <a href="index.html" class="home-btn">返回首頁繼續購物</a>
        </div>
    </div>

    <textarea id="copy-helper" readonly style="position:fixed; top:-9999px;"></textarea>

    <script src="js/order_success.js"></script>
</body>
</html>
