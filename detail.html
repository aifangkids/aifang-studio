<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-5XTC9J1E5P"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-5XTC9J1E5P');
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Detail | AiFang Kids</title>
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/detail.css">
    <style>
        /* 針對 image_extra 多圖展示的優化樣式 */
        .scroll-content {
            display: flex;
            flex-direction: column;
            gap: 10px; /* 圖片間距 */
        }
        .extra-img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
        }
        /* 電腦版：左側圖區可滾動，右側資訊固定 */
        @media (min-width: 901px) {
            .detail-wrapper {
                display: flex;
                gap: 40px;
            }
            .scroll-content {
                flex: 1;
                max-width: 65%;
            }
            .fixed-aside {
                width: 35%;
                position: sticky;
                top: 90px;
                height: fit-content;
            }
        }
        /* 手機版：圖片撐滿上方 */
        @media (max-width: 900px) {
            .detail-wrapper {
                display: block;
            }
            .scroll-content {
                width: 100%;
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>

    <header class="top-header">
        <a href="javascript:history.back()" class="header-icon">BACK</a>
        <img src="images/ui/logo.png" class="main-logo" alt="AIFANG" onclick="location.href='index.html'">
        <a href="cart.html" class="header-icon">CART (<span id="cart-count">0</span>)</a>
    </header>

    <div class="detail-wrapper">
        <main class="scroll-content" id="image-main-area">
            <div id="loading-spinner" style="padding: 50px; text-align: center; color: #ccc;">Loading Images...</div>
        </main>

        <aside class="fixed-aside" id="product-info">
            <span id="p-brand" class="brand-tag">-</span>
            <h1 id="p-title" class="p-title">LOADING...</h1>
            <p id="p-id" class="p-id">CODE: -</p>

            <span class="label">COLOR / 花色選取</span>
            
            <div id="mobile-preview-area" class="mobile-preview-box">
                <img id="mobile-color-preview-img" src="images/ui/placeholder.jpg">
                <div class="preview-info-text">
                    <span class="preview-label">SELECTED</span>
                    <span id="mobile-color-preview-name">請選擇</span>
                </div>
            </div>

            <div id="swatch-group" class="swatch-group"></div>

            <span class="label">SIZE / 尺寸與價格</span>
            <div id="size-area"></div>

            <div id="selected-list" class="selected-list"></div>

            <button id="add-cart-btn" class="add-cart-btn" onclick="addAllToCart()">ADD TO CART</button>
            
            <p id="styling-note" class="styling-note-text"></p>
        </aside>
    </div>

    <button class="mobile-order-trigger" id="scroll-trigger" onclick="scrollToOptions()">SELECT OPTIONS</button>

    <div class="tool-btns">
        <div class="tool-btn" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">TOP</div>
    </div>

    <div id="custom-toast"></div>

    <script src="js/api.js"></script>
    <script src="js/detail.js"></script>

    <script>
        /**
         * 畫面滾動邏輯：讓使用者點擊手機版按鈕後直接滑到選項區
         */
        function scrollToOptions() {
            const aside = document.getElementById('product-info');
            if (aside) {
                const offset = aside.offsetTop - 70;
                window.scrollTo({ top: offset, behavior: 'smooth' });
            }
        }

        /**
         * 監聽滾動：手機版下方浮動按鈕的顯示/隱藏切換
         */
        window.addEventListener('scroll', () => {
            const trigger = document.getElementById('scroll-trigger');
            const aside = document.getElementById('product-info');
            if (window.innerWidth <= 900 && trigger && aside) {
                if (window.pageYOffset > (aside.offsetTop - 200)) {
                    trigger.style.opacity = '0';
                    trigger.style.pointerEvents = 'none';
                } else {
                    trigger.style.opacity = '1';
                    trigger.style.pointerEvents = 'auto';
                }
            }
        });
    </script>
</body>
</html>
