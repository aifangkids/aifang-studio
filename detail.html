<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    
    <title>商品資訊</title>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-5XTC9J1E5P"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-5XTC9J1E5P');
    </script>

    <link rel="icon" href="./favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="./assets/css/global.css">    
    <link rel="stylesheet" href="./assets/css/detail.css">
</head>
<body>

    <header class="top-header">
        <a href="javascript:history.back()" class="header-icon">BACK</a>
        <img src="images/ui/logo.png" class="main-logo" alt="AIFANG" onclick="location.href='index.html'">
        <a href="cart.html" class="header-icon">CART (<span id="cart-count">0</span>)</a>
    </header>

    <div class="detail-wrapper">
        
        <main class="scroll-content" id="image-main-area">
            <div id="loading-spinner" style="padding: 50px; text-align: center; color: #ccc;">Loading Images...</div>
        </main>

        <aside class="fixed-aside" id="product-info">
            
            <div class="info-row" style="border-bottom: none; padding-bottom: 0;">
                <p id="p-id" class="p-id"></p>
            </div>

            <div class="info-row" style="padding-top: 0;">
                <span id="p-brand" class="brand-tag">-</span>
                <h1 id="p-title" class="p-title">LOADING...</h1>
            </div>

            <div class="info-row">
                <span class="info-label">COLOR</span>
                <div id="swatch-group" class="swatch-group"></div>
            </div>

            <div class="info-row">
                <div id="p-price" class="p-price"></div>
            </div>

            <div class="info-row">
                <div id="size-area" class="size-group"></div>
            </div>

            <div class="info-row" style="border-bottom: none; margin-bottom: 10px;">
                <span class="detail-large-label">DETAILS</span>
                <p id="p-desc" class="info-value">正在載入商品詳細說明...</p>
            </div>

            <div id="selected-list" class="selected-list"></div>

            <button id="add-cart-btn" class="add-cart-btn">ADD TO CART</button>
        </aside>
    </div>

    <div id="custom-toast"></div>

    <script src="js/api.js"></script>
    <script src="js/detail.js"></script>

    <!-- ✨ GA4 追蹤外掛 -->
    <script>
        (function() {
            const titleElement = document.getElementById('p-title');
            if (titleElement) {
                const observer = new MutationObserver(() => {
                    // 當衣服品名成功從 Google 試算表載入，文字不再是 LOADING... 時
                    if (titleElement.innerText !== 'LOADING...' && titleElement.innerText.trim() !== '') {
                        const beautifulTitle = `${titleElement.innerText} | Aifangkids`;
                        
                        // 1. 同步變更手機與電腦瀏覽器的分頁標題名稱
                        document.title = beautifulTitle;
                        
                        // 2. 📢呼叫 GA4 重新「中文商品品名」記錄這一次的瀏覽！
                        if (typeof gtag === 'function') {
                            gtag('event', 'page_view', {
                                page_title: beautifulTitle,
                                page_location: window.location.href
                            });
                        }
                        
                        observer.disconnect(); // 任務完成，自動關閉盯盤機制以節省手機效能
                    }
                });
                // 啟動隱形小幫手，開始盯著標題變化
                observer.observe(titleElement, { childList: true, subtree: true });
            }
        })();
    </script>

</body>
</html>
