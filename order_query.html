<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-5XTC9J1E5P"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-5XTC9J1E5P');
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Lookup | AiFang Kids</title>
    <script src="js/api.js"></script>
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
    :root { 
        --header-h: 70px;
        --accent: #d9534f; 
        --gray-bg: #fafafa; 
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
        font-family: 'Noto Sans TC', sans-serif; 
        background: #fff; 
        color: #333;
        line-height: 1.6; 
        overflow-x: hidden; /* 防止手機版左右晃動 */
    }

    /* --- Header --- */
    .top-header { 
        width: 100%;
        height: var(--header-h); 
        background: #fff; 
        position: fixed; 
        top: 0; 
        left: 0; 
        z-index: 2000; 
        display: flex; 
        align-items: center; 
        justify-content: space-between;
        padding: 0 25px; 
        border-bottom: 1px solid #f2f2f2; 
    }
    .main-logo { 
        height: 30px;
        cursor: pointer; 
        position: absolute; 
        left: 50%; 
        transform: translateX(-50%); 
    }
    .header-icon { 
        font-size: 11px;
        font-weight: bold; 
        cursor: pointer; 
        text-decoration: none; 
        color: #333; 
        letter-spacing: 2px; 
        border-bottom: 1px solid #333;
    }

    /* --- Layout --- */
    .container { 
        max-width: 800px;
        margin: calc(var(--header-h) + 30px) auto 80px; 
        padding: 0 20px; 
    }
    .page-title { 
        font-size: 20px;
        font-weight: 900; 
        letter-spacing: 4px; 
        text-align: center; 
        margin-bottom: 30px; 
        text-transform: uppercase;
    }

    /* --- Search Section (修正按鈕不見的問題) --- */
    .search-section { 
        background: var(--gray-bg);
        padding: 30px 15px; 
        border-radius: 12px; 
        text-align: center; 
        margin-bottom: 40px; 
        border: 1px solid #eee;
    }
    .search-group { 
        display: flex; 
        max-width: 500px; 
        margin: 0 auto; 
        border-radius: 6px;
        overflow: hidden; 
        box-shadow: 0 2px 8px rgba(0,0,0,0.05); 
        background: #fff;
    }
    .query-input { 
        flex: 1;
        padding: 15px; 
        border: 1px solid #ddd; 
        border-right: none; 
        outline: none; 
        font-size: 15px;
        min-width: 0; /* 防止 flex 子元素撐破容器 */
    }
    .query-btn { 
        padding: 0 25px; 
        background: #111; 
        color: #fff; 
        border: none;
        cursor: pointer; 
        font-weight: 700; 
        letter-spacing: 1px;
        white-space: nowrap; /* 確保按鈕文字不換行 */
        transition: background 0.3s;
    }
    .query-btn:active { background: #444; }
    .query-btn:disabled { background: #ccc; }

    /* --- Progress Bar --- */
    .progress-container { margin: 30px 0 50px; position: relative; }
    .progress-track { 
        position: absolute; 
        top: 6px; 
        left: 5%; 
        right: 5%;
        height: 2px; 
        background: #eee; 
        z-index: 1; 
    }
    #progress-bar-fill { 
        position: absolute; 
        top: 0;
        left: 0; 
        height: 100%; 
        background: #111; 
        width: 0%; 
        transition: width 1s ease;
    }
    .progress-steps { 
        display: flex; 
        justify-content: space-between; 
        position: relative; 
        z-index: 2;
    }
    .step-node { text-align: center; flex: 1; }
    .step-dot { 
        width: 14px; 
        height: 14px; 
        background: #eee; 
        border: 3px solid #fff;
        border-radius: 50%; 
        margin: 0 auto 10px; 
        box-shadow: 0 0 0 1px #eee;
    }
    .step-node.active .step-dot { background: #111; box-shadow: 0 0 0 1px #111; }
    .step-text { font-size: 10px; color: #bbb; font-weight: 700; white-space: nowrap; }
    .step-node.active .step-text { color: #111; }

    /* --- Result Area --- */
    #result-area { display: none; animation: fadeIn 0.5s ease-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .order-meta { border-bottom: 2px solid #111; padding-bottom: 10px; margin-bottom: 25px; }
    .meta-row { display: flex; justify-content: space-between; font-size: 14px; padding: 12px 0; border-bottom: 1px solid #f9f9f9; }
    .meta-label { color: #888; }
    .meta-value { color: #111; font-weight: 700; }

    /* --- Item List --- */
    .order-item { padding: 20px 0; border-bottom: 1px solid #eee; }
    .item-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
    .item-name { font-size: 15px; font-weight: 700; color: #111; margin-bottom: 4px; }
    .item-kr-name { font-size: 11px; color: #999; margin-bottom: 8px; }
    .item-spec { font-size: 12px; color: #666; background: #f5f5f5; display: inline-block; padding: 2px 8px; border-radius: 4px; }
    .item-price { font-weight: 700; font-size: 14px; color: #111; text-align: right; }

    /* --- Summary --- */
    .summary-box { margin-top: 30px; background: #fafafa; border: 1px solid #eee; padding: 25px; border-radius: 8px; }
    .summary-line { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; }
    .summary-line.total { border-top: 1px solid #ddd; padding-top: 20px; margin-top: 15px; font-size: 20px; font-weight: 900; }

    #error-msg { display: none; color: var(--accent); text-align: center; margin-top: 20px; padding: 15px; background: #fff5f5; border-radius: 6px; font-weight: 700; }

    /* --- 手機版響應式微調 --- */
    @media (max-width: 600px) {
        .container { margin-top: calc(var(--header-h) + 20px); }
        
        /* 確保搜尋按鈕在窄螢幕仍能顯示 */
        .search-group { flex-direction: row; } 
        .query-btn { padding: 0 20px; font-size: 14px; }
        
        .meta-row { flex-direction: column; }
        .meta-value { text-align: left; margin-top: 4px; }
        
        .step-text { font-size: 9px; transform: scale(0.9); }
        
        .summary-box { padding: 15px; }
        .summary-line.total { font-size: 18px; }
    }
</style>
</head>
<body>

    <header class="top-header">
        <a href="index.html" class="header-icon">BACK</a>
        <img src="images/ui/logo.png" class="main-logo" alt="Logo" onclick="location.href='index.html'">
        <div style="width: 40px;"></div>
    </header>

    <div class="container">
        <h1 class="page-title">ORDER LOOKUP</h1>

        <div class="search-section">
            <div class="search-group">
                <input type="text" id="order-id-input" class="query-input" placeholder="輸入訂單編號">
                <button class="query-btn" id="q-btn" onclick="handleQuery()">查詢</button>
            </div>
        </div>

        <div id="error-msg"></div>

        <div id="result-area">
            <div class="progress-container">
                <div class="progress-track"><div id="progress-bar-fill"></div></div>
                <div class="progress-steps">
                    <div class="step-node" id="step-1"><div class="step-dot"></div><span class="step-text">待處理</span></div>
                    <div class="step-node" id="step-2"><div class="step-dot"></div><span class="step-text">已登記</span></div>
                    <div class="step-node" id="step-3"><div class="step-dot"></div><span class="step-text">已付款</span></div>
                    <div class="step-node" id="step-4"><div class="step-dot"></div><span class="step-text">已出貨</span></div>
                    <div class="step-node" id="step-5"><div class="step-dot"></div><span class="step-text">已完成</span></div>
                </div>
            </div>

            <div class="order-meta">
                <div class="meta-row"><span class="meta-label">訂單編號</span><span class="meta-value" id="res-id"></span></div>
                <div class="meta-row"><span class="meta-label">下單日期</span><span class="meta-value" id="res-date"></span></div>
                <div class="meta-row"><span class="meta-label">顧客姓名</span><span class="meta-value" id="res-name"></span></div>
                <div class="meta-row"><span class="meta-label">配送方式</span><span class="meta-value" id="res-shipping-method"></span></div>
            </div>

            <div id="order-items-container"></div>

            <div class="summary-box">
                <div class="summary-line"><span>商品小計</span><span id="res-subtotal"></span></div>
                <div class="summary-line"><span>運費</span><span id="res-shipping-fee"></span></div>
                <div class="summary-line" style="color:var(--accent); font-weight:700;"><span>折扣金額</span><span id="res-discount"></span></div>
                <div class="summary-line total"><span>總計金額</span><span id="res-total"></span></div>
            </div>
        </div>
    </div>

    <script>
        const fmt = (v) => `NT$ ${Math.floor(Number(v)||0).toLocaleString()}`;

        async function handleQuery() {
            const idValue = document.getElementById('order-id-input').value.trim();
            if(!idValue) return;

            const btn = document.getElementById('q-btn');
            const resArea = document.getElementById('result-area');
            const errBox = document.getElementById('error-msg');

            btn.disabled = true; btn.innerText = "...";
            resArea.style.display = 'none';
            errBox.style.display = 'none';

            try {
                const data = await ApiService.queryOrder(idValue);
                if (data.success && data.order) {
                    renderOrder(data.order);
                    resArea.style.display = 'block';
                } else {
                    errBox.innerText = data.message || "找不到該訂單，請核對編號。";
                    errBox.style.display = 'block';
                }
            } catch (e) {
                errBox.innerText = "連線失敗，請稍後再試。";
                errBox.style.display = 'block';
            } finally {
                btn.disabled = false; btn.innerText = "查詢";
            }
        }

        function renderOrder(order) {
            // 對接 cart.js / order_success.js 的物件結構
            const customer = order.customer || {};
            const summary = order.summary || {};

            document.getElementById('res-id').innerText = order.order_id || "-";
            document.getElementById('res-date').innerText = order.order_date || "-";
            document.getElementById('res-name').innerText = (customer.name || order.customer_name) || "-";
            document.getElementById('res-shipping-method').innerText = (customer.shipping_method || order.shipping_method) || "宅配";
            
            // 進度條
            const status = String(order.order_status || "NEW").toUpperCase();
            const levelMap = { "NEW": 1, "REGISTERED": 2, "PAID": 3, "SHIPPED": 4, "COMPLETED": 5 };
            let level = levelMap[status] || 1;

            document.getElementById('progress-bar-fill').style.width = ((level - 1) / 4 * 100) + "%";
            for(let i=1; i<=5; i++) {
                const node = document.getElementById(`step-${i}`);
                if(node) i <= level ? node.classList.add('active') : node.classList.remove('active');
            }

            // 商品清單渲染 (無圖片版)
            const items = order.items || [];
            document.getElementById('order-items-container').innerHTML = items.map(item => {
                const name = item.name || item.product_name;
                const krName = item.korean_name ? `<div class="item-kr-name">${item.korean_name}</div>` : "";
                const krColor = item.korean_color ? ` (${item.korean_color})` : "";
                const price = item.unit_price || item.price || 0;

                return `
                    <div class="order-item">
                        <div class="item-header">
                            <div>
                                <div class="item-name">${name}</div>
                                ${krName}
                                <div class="item-spec">規格：${item.color}${krColor} / ${item.size}</div>
                            </div>
                            <div class="item-price">
                                <div>${fmt(price)}</div>
                                <div style="font-size:11px; color:#999; text-align:right; font-weight:400;">x ${item.quantity}</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            // 金額彙整 (對接 summary 物件層級)
            const subtotal = summary.subtotal || order.subtotal || 0;
            const shipping = summary.shipping_fee || order.shipping_fee || 0;
            const discount = summary.discount_total || order.discount_total || 0;
            const total = summary.total_payable || order.total_amount || 0;

            document.getElementById('res-subtotal').innerText = fmt(subtotal);
            document.getElementById('res-shipping-fee').innerText = fmt(shipping);
            document.getElementById('res-discount').innerText = `- ${fmt(discount)}`;
            document.getElementById('res-total').innerText = fmt(total);
        }
    </script>
</body>
</html>
