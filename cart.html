<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart | AiFang Kids</title>
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="./assets/css/cart.css">
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-5XTC9J1E5P"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-5XTC9J1E5P');
    </script>
</head>
<body>

    <header class="top-header">
        <a href="index.html" class="back-to-shop">
            CONTINUE SHOPPING
        </a>
        <img src="images/ui/logo.png" class="main-logo" alt="AIFANG" onclick="location.href='index.html'">
    </header>

    <div class="cart-main-wrapper">
        
        <div class="cart-left-section">
            
            <div class="cart-block">
                <h2 class="block-title">1. 訂購資訊</h2>
                <div class="form-group">
                    <label>訂購人名字 (LINE 名字)</label>
                    <input type="text" id="cust-name" class="form-control" placeholder="請輸入您的 LINE 顯示名稱">
                </div>
                <div class="form-group">
                    <label>Email (寄送訂單通知用)</label>
                    <input type="email" id="cust-email" class="form-control" placeholder="example@mail.com">
                </div>
            </div>

            <div class="cart-block">
                <h2 class="block-title">2. 配送方式</h2>
                <div class="form-group">
                    <label>選擇取貨方式</label>
                    <select id="shipping-method" class="form-control">
                        <option value="7-11">7-11</option>
                        <option value="全家">全家</option>
                    </select>
                    <div id="shipping-notice"></div>
                </div>
            </div>

        </div>

        <div class="summary-sticky-box cart-block">
            <h2 class="block-title">訂單資訊</h2>
            
            <div id="cart-items-preview"></div>

            <div class="summary-details">
                <div class="summary-row">
                    <span class="summary-label">商品小計</span>
                    <span id="cart-subtotal" class="summary-value">NT$ 0</span>
                </div>
                <hr class="summary-divider">
                <div class="summary-row total-row">
                    <span class="total-label">總計金額</span>
                    <span id="cart-total" class="total-value">NT$ 0</span>
                </div>
            </div>

            <button id="submit-order-btn">提交訂單並結帳</button>

            <div class="cart-notes">
                * 商品金額已含營業稅<br>
                * 預購商品等待天數約 7~25 天，不接急單<br>
                * 成立訂單後請通知LINE官方，並完成付款
            </div>
        </div>
        
    </div>

    <div id="custom-toast"></div>

    <script src="js/api.js"></script> 
    <script src="js/cart.js"></script>
</body>
</html>
