<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AiFang Studio</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-5XTC9J1E5P"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-5XTC9J1E5P');
    </script>

    <link rel="icon" href="./favicon.ico" type="image/x-icon">
    
    <link rel="stylesheet" href="./assets/css/indexstyle.css">
</head>
<body>

    <div class="hero-banner">
        <button class="start-shopping-btn" onclick="enterShop()">🌈ᴡᴇʟᴄᴏᴍᴇ</button>
    </div>

    <header class="top-header" id="main-header">
        <div class="header-left">
            <img src="./images/ui/menu.png" class="header-icon" onclick="toggleMenu()" alt="Menu">
        </div>

        <img src="./images/ui/logo.png" class="main-logo site-logo" id="main-logo" onclick="location.reload()" alt="AIFANGKIDS">
        
        <div class="header-right">
            <div class="search-wrap">
                <input type="text" id="search-input" placeholder="SEARCH">
                <img src="./images/ui/magnifying-glass.png" class="header-icon search-icon-img" alt="Search">
            </div>
            <img src="./images/ui/icon_tcart.png" class="header-icon" onclick="location.href='cart.html'" alt="Cart">
        </div>
    </header>

    <div id="overlay" class="sidebar-overlay" onclick="closeMenu()"></div>

    <aside id="sidebar" class="sidebar">
        <div class="category-group">
            <h3 class="category-title">CATEGORY</h3>
            <ul class="category-list">
                <li><a href="#" onclick="filterByCat('All')" class="active">ALL ITEMS</a></li>
                <li><a href="#" onclick="filterByCat('TOP')">TOPS</a></li>
                <li><a href="#" onclick="filterByCat('BOTTOM')">BOTTOMS</a></li>
                <li><a href="#" onclick="filterByCat('SET')">SETS</a></li>
            </ul>
        </div>

        <hr class="sidebar-divider">

        <div class="category-group">
            <h3 class="category-title">BRANDS</h3>
            <ul class="category-list brand-list" id="brand-list">
                </ul>
        </div>
    </aside>

    <main id="main-content" class="main-content">
        <div id="product-list" class="product-grid">
            </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
